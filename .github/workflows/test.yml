name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: la_chacra_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for DB
        run: |
          until pg_isready -h localhost -p 5433; do
            sleep 1
          done

      - name: Push DB schema
        run: npm run test:db:setup
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/la_chacra_test

      - name: Run tests
        run: npm run test:run
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5433/la_chacra_test
          JWT_SECRET: test
          AWS_BUCKET_NAME: test
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          RESEND_API_KEY: test